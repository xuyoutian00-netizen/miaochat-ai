<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --ios-bg-image: url('https://i.ibb.co/d065phQ8/IMG-20260327-232500.jpg');
            --ios-black: #000000;
            --island-w: 125.5px;
            --island-h: 36.67px;
            --side-padding: 21px; 
            --torch-brightness: 0%;
            --pink-theme: #FC8EA5;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none; touch-action: none;
        }

        body { 
            background-image: var(--ios-bg-image);
            background-size: cover;
            background-position: center;
            height: 100vh; width: 100vw; overflow: hidden; 
        }

        /* --- 状态栏 --- */
        .status-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 54px; z-index: 2000;
            display: flex; align-items: center; padding: 0 var(--side-padding);
        }
        .status-left { flex: 1; display: flex; align-items: center; justify-content: flex-start; }
        #carrier, #mini-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--ios-black); }
        #mini-time { position: absolute; opacity: 0; left: var(--side-padding); transition: opacity 0.3s; }
        .unlocked #carrier { opacity: 0; visibility: hidden; }
        .unlocked #mini-time { opacity: 1; }
        .status-icons { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 5.8px; }
        .sig-bar { width: 3.3px; background-color: var(--ios-black); border-radius: 1px; }
        .wifi-svg { width: 19px; height: 14.5px; fill: var(--ios-black); }
        .bat-shell { width: 24.5px; height: 11.5px; border: 1px solid rgba(0,0,0,0.6); border-radius: 3.8px; position: relative; padding: 1.35px; }
        .bat-level { width: 88%; height: 100%; background-color: var(--ios-black); border-radius: 1px; }
        .bat-tip { width: 1.5px; height: 4.2px; background-color: rgba(0,0,0,0.6); border-radius: 0 1.5px 1.5px 0; margin-left: 1px; }

        /* --- 锁屏 --- */
        .lock-screen {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; z-index: 1500;
            background-image: var(--ios-bg-image); background-size: cover; background-position: center;
            will-change: transform, opacity;
        }
        .lock-time { margin-top: 105px; font-size: 88px; font-weight: 200; letter-spacing: -2px; color: var(--ios-black); }
        .lock-date { font-size: 21px; font-weight: 500; margin-top: -8px; color: var(--ios-black); }
        .swipe-hint {
            position: absolute; bottom: 28px; font-size: 17px; font-weight: 500; color: rgba(0, 0, 0, 0.5);
            letter-spacing: -0.4px; animation: swipeHintAnim 3s ease-in-out infinite; pointer-events: none;
        }

        /* --- 桌面主界面 --- */
        .home-screen {
            position: absolute; inset: 0; z-index: 1000;
            background-image: var(--ios-bg-image); background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 80px; 
        }

        /* 第一个组件：微调上移了一点 */
        .top-widgets {
            display: flex; gap: 20px; width: 78%; height: 135px; 
            margin-top: 25px; /* 从 40px 减小到 25px，实现上移一点点 */
        }
        .widget-img-large {
            flex: 1; height: 100%; border-radius: 22px; 
            background-color: rgba(255, 255, 255, 0.5);
            background-size: cover; background-position: center; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }
        .widget-right-stack { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        .music-pill { height: 32px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .music-pill svg { fill: var(--pink-theme); width: 14px; height: 14px; }
        .spectrum { display: flex; gap: 2px; align-items: center; }
        .spectrum span { width: 2.5px; background: var(--pink-theme); border-radius: 2px; height: 8px; }

        .battery-pill {
            height: 38px; background: rgba(255, 234, 240, 0.9); border-radius: 19px;
            display: flex; align-items: center; justify-content: space-evenly; padding: 0 6px;
        }
        .battery-pill span { color: var(--pink-theme); font-weight: 700; font-size: 12px; }
        .battery-pill svg { fill: var(--pink-theme); width: 14px; height: 14px; }

        .storage-pill {
            height: 38px; background: rgba(255,255,255,0.9); border-radius: 19px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px;
        }
        .storage-pill span { color: var(--pink-theme); font-size: 11px; font-weight: 600; }
        .storage-pill svg { fill: var(--pink-theme); width: 14px; height: 14px; }

        .iscreen-label {
            font-size: 11px; color: #000; font-weight: 600; text-align: center; 
            margin-top: 8px; letter-spacing: 0.5px; opacity: 0.7;
        }

        /* 第二个组件：维持原位不动 */
        .mid-widgets {
            position: relative; width: 70%; height: 120px; 
            display: flex; justify-content: center; align-items: center; 
            margin-top: 65px; 
        }
        .widget-circle {
            width: 92px; height: 92px; border-radius: 50%; 
            background-color: rgba(255, 255, 255, 0.5);
            background-size: cover; background-position: center; 
            cursor: pointer; z-index: 2; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .small-pill {
            position: absolute; background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(15px);
            padding: 12px 12px; border-radius: 12px; font-size: 10px; font-weight: 700; color: #000;
            display: flex; align-items: center; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            white-space: nowrap;
        }
        .small-pill.tl { left: -5px; top: -5px; }
        .small-pill.bl { left: -5px; bottom: -5px; }
        .small-pill.tr { right: -5px; top: -5px; }
        .small-pill.br { right: -5px; bottom: -5px; }
        
        .deco-dots { color: #333; font-size: 9px; letter-spacing: 3px; margin-top: 6px; font-weight: bold; }

        /* Dock 栏 */
        .dock {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 94px; border-radius: 38px;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(35px);
            display: flex; justify-content: space-around; align-items: center; padding: 0 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dock-app {
            width: 62px; height: 62px; border-radius: 15px; overflow: hidden;
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255, 255, 255, 0.6);
        }
        .dock-app img { width: 100%; height: 100%; object-fit: cover; }

        .home-bar {
            position: fixed; bottom: 9px; left: 50%; transform: translateX(-50%);
            width: 134px; height: 5px; background-color: var(--ios-black);
            border-radius: 100px; z-index: 3000;
        }

    </style>
</head>
<body id="mainBody">

    <div class="status-bar">
        <div class="status-left"><span id="carrier">中国移动</span><span id="mini-time">9:41</span></div>
        <div class="status-icons">
            <div style="display:flex; align-items:flex-end; gap:1.6px; height:11px;"><div class="sig-bar" style="height:4.2px"></div><div class="sig-bar" style="height:6.5px"></div><div class="sig-bar" style="height:8.8px"></div><div class="sig-bar" style="height:11px"></div></div>
            <svg class="wifi-svg" viewBox="0 0 24 24"><path d="M12,21L15.6,17.2C14.6,16.45 13.35,16 12,16C10.65,16 9.4,16.45 8.4,17.2L12,21M12,4C7.95,4 4.21,5.34 1.2,7.6L3,9.9C5.5,8.12 8.63,7 12,7C15.37,7 18.5,8.12 21,9.9L22.8,7.6C19.79,5.34 16.05,4 12,4M12,10C9.3,10 6.81,10.89 4.8,12.4L6.6,14.7C8.1,13.64 9.97,13 12,13C14.03,13 15.9,13.64 17.4,14.7L19.2,12.4C17.19,10.89 14.7,10 12,10Z" /></svg>
            <div class="battery-container" style="display:flex; align-items:center;"><div class="bat-shell"><div class="bat-level"></div></div><div class="bat-tip"></div></div>
        </div>
    </div>

    <div class="lock-screen" id="lockScreen">
        <div class="lock-time" id="big-time">09:41</div>
        <div class="lock-date" id="big-date">3月22日 星期日</div>
        <div class="swipe-hint">向上轻扫以解锁</div>
    </div>

    <div class="home-screen" id="homeScreen">
        <div class="top-widgets">
            <div class="widget-img-large upload-trigger"></div>
            <div class="widget-right-stack">
                <div class="music-pill">
                    <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9v7c0 1.1.9 2 2 2h4v-8H5v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1h-4v8h4c1.1 0 2-.9 2-2v-7c0-4.97-4.03-9-9-9z"/></svg>
                    <div class="spectrum"><span></span><span></span><span></span><span></span><span></span></div>
                    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <div class="battery-pill">
                    <svg viewBox="0 0 24 24" style="transform: rotate(90deg);"><path d="M15 4h-1c0-1.1-.9-2-2-2s-2 .9-2 2H9c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 16H10V9h4v11z"/></svg>
                    <span>90%</span>
                    <svg viewBox="0 0 24 24"><path d="M12 21L15.6 17.2C14.6 16.45 13.35 16 12 16C10.65 16 9.4 16.45 8.4 17.2L12 21M12 4C7.95 4 4.21 5.34 1.2 7.6L3 9.9C5.5 8.12 8.63 7 12 7C15.37 7 18.5 8.12 21 9.9L22.8 7.6C19.79,5.34 16.05 4 12 4M12 10C9.3 10 6.81 10.89 4.8 12.4L6.6 14.7C8.1 13.64 9.97 13 12 13C14.03 13 15.9 13.64 17.4 14.7L19.2 12.4C17.19 10.89 14.7 10 12 10Z"/></svg>
                </div>
                <div class="storage-pill">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>167.4/255GB</span>
                    <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                </div>
            </div>
        </div>
        <div class="iscreen-label"> </div>

        <div class="mid-widgets">
            <div class="small-pill tl">🎀 ᵕ̈Helloooo⚝</div>
            <div class="small-pill bl">🍧 ⁺✧Blingbling</div>
            <div class="widget-circle upload-trigger"></div>
            <div class="small-pill tr">🧸 °*weekday</div>
            <div class="small-pill br">🥤 و✧daily life</div>
        </div>
        <div class="deco-dots"> </div>
        <div class="iscreen-label"> </div>

        <div class="dock">
            <div class="dock-app"><img src="https://i.ibb.co/0Ry46m3v/magicut-1774623729382.png"></div>
            <div class="dock-app"><img src="https://i.ibb.co/twQV6HzS/magicut-1774623791306.png"></div>
            <div class="dock-app"><img src="https://i.ibb.co/CKmm2vPD/magicut-1774623807097.png"></div>
            <div class="dock-app"><img src="https://i.ibb.co/395yKWXH/magicut-1774623847474.png"></div>
        </div>

    </div> 
    <div class="home-bar" id="homeBar"></div>
    <input type="file" id="imageUploader" accept="image/*" style="display: none;">

    <script>
        let startY = 0; let isDragging = false; let isUnlocked = false;
        const lockScreen = document.getElementById('lockScreen');

        window.addEventListener('touchstart', (e) => {
            if (isUnlocked) return;
            startY = e.touches[0].clientY; isDragging = true;
            lockScreen.style.transition = 'none';
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let diff = startY - e.touches[0].clientY;
            if (diff > 0) {
                lockScreen.style.transform = `translateY(-${diff}px)`;
                lockScreen.style.opacity = 1 - (diff / window.innerHeight);
            }
        });

        window.addEventListener('touchend', (e) => {
            if (!isDragging) return; isDragging = false;
            let diff = startY - e.changedTouches[0].clientY;
            if (diff > window.innerHeight * 0.15) {
                isUnlocked = true;
                lockScreen.style.transition = 'all 0.6s cubic-bezier(0.32, 0.72, 0, 1)';
                lockScreen.style.transform = 'translateY(-100vh)';
                document.body.classList.add('unlocked');
            } else {
                lockScreen.style.transition = 'all 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
                lockScreen.style.transform = 'translateY(0)'; lockScreen.style.opacity = '1';
            }
        });

        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('big-time').innerText = timeStr;
            document.getElementById('mini-time').innerText = timeStr;
        }
        setInterval(updateTime, 1000); updateTime();

        const fileInput = document.getElementById('imageUploader');
        let currentUploadTarget = null;
        document.querySelectorAll('.upload-trigger').forEach(el => {
            el.addEventListener('click', (e) => { if(!isUnlocked) return; currentUploadTarget = e.currentTarget; fileInput.click(); });
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && currentUploadTarget) {
                const reader = new FileReader();
                reader.onload = (ev) => { currentUploadTarget.style.backgroundImage = `url(${ev.target.result})`; };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });
    </script>
</body>
</html>
